<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHONK HUB</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#05010d;
  color:white;
  overflow-x:hidden;
  padding-bottom:170px;
  background-image:
  radial-gradient(circle at top,#290033,#05010d 60%);
}

/* NAVBAR */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:rgba(0,0,0,0.75);
  border-bottom:1px solid #ff00ff55;
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.logo{
  font-size:40px;
  font-weight:bold;
  color:#ff00ff;
  text-shadow:
  0 0 15px #ff00ff,
  0 0 30px #ff00ff;
}

.search-box{
  width:350px;
}

.search-box input{
  width:100%;
  padding:14px 22px;
  border-radius:40px;
  border:1px solid #ff00ff55;
  background:#12061f;
  color:white;
  outline:none;
  font-size:15px;
}

/* HERO */

.hero{
  text-align:center;
  padding:20px 15px;
}

.hero img{
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #ff00ff;
  box-shadow: 0 0 20px #ff00ff55;
  display: block;
  margin: 0 auto;
}

.hero p{
  margin-top:15px;
  color:#bbb;
  font-size:16px;
  line-height:24px;
}

/* SONGS */

.songs{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */

.card{
  background:#0a0712;
  border-radius:22px;
  overflow:hidden;
  border:1px solid #ffffff10;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px);
  border:1px solid #ff00ff88;
  box-shadow:
  0 0 25px #ff00ff55;
}

.phonk-image{
  width:100%;
  height:320px;
  overflow:hidden;
}

.phonk-image img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.content{
  padding:20px;
}

.content h2{
  font-size:30px;
  margin-bottom:10px;
}

.artist{
  color:#ff00ff;
  margin-bottom:20px;
  font-size:16px;
}

/* BUTTONS */

.buttons{
  display:flex;
  gap:12px;
}

.play-btn{
  flex:1;
  background:
  linear-gradient(45deg,#ff00ff,#8a00ff);
  border:none;
  color:white;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

.download-btn{
  flex:1;
  background:#1a1a1a;
  border:none;
  color:white;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

/* MINI WAVE */

.mini-wave{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:20px;
}

.mini-wave span{
  width:4px;
  background:white;
  border-radius:10px;
  animation:wave 1s infinite ease-in-out;
}

.mini-wave span:nth-child(1){
  height:8px;
}

.mini-wave span:nth-child(2){
  height:16px;
  animation-delay:0.2s;
}

.mini-wave span:nth-child(3){
  height:10px;
  animation-delay:0.4s;
}

.mini-wave span:nth-child(4){
  height:18px;
  animation-delay:0.6s;
}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.5);
  }

  100%{
    transform:scaleY(0.5);
  }

}

/* PLAYER */

#nowPlaying{

  position:fixed;

  left:50%;
  bottom:85px;

  transform:translateX(-50%);

  width:92%;

  background:
  linear-gradient(
  45deg,
  rgba(15,0,25,0.96),
  rgba(5,5,15,0.96)
  );

  border-radius:28px;

  padding:18px;

  display:flex;

  flex-direction:column;

  gap:15px;

  z-index:9999;

  border:1px solid #ff00ff44;

  box-shadow:
  0 0 30px rgba(255,0,255,0.25);

}

.player-top{

  display:flex;

  align-items:center;

  gap:16px;

}

#pauseBtn{

  width:72px;
  height:72px;

  border:none;

  border-radius:50%;

  background:
  linear-gradient(45deg,#ff00ff,#8a00ff);

  color:white;

  font-size:28px;

  cursor:pointer;

  box-shadow:
  0 0 25px rgba(255,0,255,0.6);

}

#nowTitle{

  font-size:20px;

  font-weight:bold;

  line-height:28px;

}

#progressBar,
#volumeBar{

  width:100%;

  accent-color:#ff00ff;

}

/* APP NAVBAR */

.bottom-nav{

  position:fixed;

  bottom:0;
  left:0;

  width:100%;

  height:75px;

  background:
  rgba(8,5,18,0.96);

  border-top:
  1px solid #ff00ff44;

  display:flex;

  justify-content:space-around;

  align-items:center;

  z-index:99999;

  backdrop-filter:blur(12px);

}

.bottom-nav a{

  text-decoration:none;

  color:#bbb;

  font-size:11px;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:4px;

}

.bottom-nav a.active{

  color:#ff00ff;

}

.nav-icon{

  font-size:24px;

}

/* MOBILE */

@media(max-width:700px){

  nav{
    flex-direction:column;
    gap:15px;
  }

  .search-box{
    width:100%;
  }

  .content h2{
    font-size:24px;
  }

  #pauseBtn{
    width:65px;
    height:65px;
  }

  #nowTitle{
    font-size:16px;
  }

}

footer{
  text-align:center;
  color:#777;
  padding:30px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

  <div class="logo">
    PHONK HUB
  </div>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search phonks..."
      onkeyup="searchSongs()"
    >

  </div>

</nav>

<!-- HERO -->

<section class="hero">

  <img src="logo.jpg">

  <p>
    Stream Your Favorite Drift & Aggressive Phonks
  </p>

</section>

<!-- SONGS -->

<section
class="songs"
id="songsContainer">
</section>

<!-- PLAYER -->

<div id="nowPlaying">

  <div class="player-top">

    <button
      id="pauseBtn"
      onclick="togglePause()"
    >
      ▶
    </button>

    <h3 id="nowTitle">
      No Song Playing
    </h3>

  </div>

  <input
    type="range"
    id="progressBar"
    min="0"
    max="100"
    value="0"
  >

  <input
    type="range"
    id="volumeBar"
    min="0"
    max="1"
    step="0.01"
    value="1"
  >

</div>

<!-- BOTTOM NAVBAR -->

<div class="bottom-nav">

  <a
    href="home.html"
    class="active"
  >

    <div class="nav-icon">
      🏠
    </div>

    HOME

  </a>

  <a href="host.html">

    <div class="nav-icon">
      👑
    </div>

    HOST

  </a>

  <a href="post.html">

    <div class="nav-icon">
        💬
    </div>

    POSTS

  </a>

  <a href="profile.html">

    <div class="nav-icon">
      👤
    </div>

    PROFILE

  </a>

</div>

<footer>
© 2026 PHONK HUB, All Rights Reserved, Credit goes to Shreyansh
</footer>

<script>

/* SONGS */

const songs = [

{
name:"NEXT-NCTS",
file:"NEXT-NCTS.mp3",
image:"1.jpg"
},

{
name:"REVENGE!",
file:"REVENGE!.mp3",
image:"2.jpg"
},

{
name:"SENTO",
file:"SENTO.mp3",
image:"3.jpg"
},

{
name:"Sol Vibra",
file:"Sol Vibra .mp3",
image:"4.jpg"
},

{
name:"Amor Na Praia",
file:"Amor Na Praia.mp3",
image:"5.jpg"
},

{
name:"MONTAGEM COMA",
file:"MONTAGEM COMA.mp3",
image:"6.jpg"
},

{
name:"FUNK CRIMINAL",
file:"FUNK CRIMINAL.mp3",
image:"7.jpg"
},

{
name:"FUNK UNIVERSO",
file:"FUNK UNIVERSO.mp3",
image:"8.jpg"
},

{
name:"LOUCURA LETAL",
file:"LOUCURA LETAL.mp3",
image:"9.jpg"
},

{
name:"Los Voltage!",
file:"Los Voltage!.mp3",
image:"1.jpg"
},

{
name:"Matushka Ultrafunk",
file:"Matushka Ultrafunk.mp3",
image:"10.jpg"
},

{
name:"NO BATIDO",
file:"NO BATIDO.mp3",
image:"2.jpg"
},

{
name:"ODNOGO ULTRAFUNK",
file:"ODNOGO ULTRAFUNK.mp3",
image:"3.jpg"
},

{
name:"Preet Re",
file:"Preet Re.mp3",
image:"4.jpg"
},

{
name:"VOCE NA MIRA",
file:"VOCE NA MIRA - Hwungii, DJ VGK1.mp3",
image:"5.jpg"
}

];

let currentSong = null;
let currentButton = null;

/* CREATE SONGS */

function createSongs(){

const container =
document.getElementById("songsContainer");

container.innerHTML = "";

songs.forEach((song,index)=>{

const id = "song"+index;

container.innerHTML += `

<div class="card">

<div class="phonk-image">

<img src="${song.image}">

</div>

<div class="content">

<h2>${song.name}</h2>

<p class="artist">
PHONK ARTIST
</p>

<audio id="${id}">
<source src="${song.file}">
</audio>

<div class="buttons">

<button
class="play-btn"
onclick="playSong('${id}','${song.name}',this)"
>

<span class="play-text">
PLAY
</span>

<div class="mini-wave">

<span></span>
<span></span>
<span></span>
<span></span>

</div>

</button>

<a
href="${song.file}"
download
style="flex:1;"
>

<button
class="download-btn"
style="width:100%;"
>
DOWNLOAD
</button>

</a>

</div>

</div>

</div>

`;

});

}

/* PLAY */

function playSong(id,name,btn){

let song =
document.getElementById(id);

if(currentSong && currentSong !== song){

currentSong.pause();
currentSong.currentTime = 0;

}

if(currentButton && currentButton !== btn){

currentButton.querySelector(".play-text")
.innerText = "PLAY";

}

if(song.paused){

song.play();

currentSong = song;
currentButton = btn;

btn.querySelector(".play-text")
.innerText = "PAUSE";

document
.getElementById("nowTitle")
.innerText = name;

document
.getElementById("pauseBtn")
.innerText = "||"

}else{

song.pause();

btn.querySelector(".play-text")
.innerText = "PLAY";

document
.getElementById("pauseBtn")
.innerText = "▶";

}

}

/* AUTO NEXT */

document.addEventListener("ended",function(e){

if(e.target.tagName === "AUDIO"){

let allSongs =
document.querySelectorAll("audio");

let currentIndex =
Array.from(allSongs).indexOf(e.target);

let nextIndex =
currentIndex + 1;

if(nextIndex >= allSongs.length){

nextIndex = 0;

}

let nextSong =
allSongs[nextIndex];

let nextCard =
nextSong.closest(".card");

let nextButton =
nextCard.querySelector(".play-btn");

let nextName =
nextCard.querySelector("h2").innerText;

playSong(
nextSong.id,
nextName,
nextButton
);

}

},true);

/* TOGGLE */

function togglePause(){

if(currentSong){

if(currentSong.paused){

currentSong.play();

document
.getElementById("pauseBtn")
.innerText = "||";

}else{

currentSong.pause();

document
.getElementById("pauseBtn")
.innerText = "▶";

}

}

}

/* PROGRESS */

setInterval(()=>{

if(currentSong){

let progress =
(currentSong.currentTime /
currentSong.duration)*100;

document
.getElementById("progressBar")
.value = progress || 0;

}

},500);

/* SEEK */

document
.getElementById("progressBar")
.addEventListener("input",function(){

if(currentSong){

currentSong.currentTime =
(this.value/100)
* currentSong.duration;

}

});

/* VOLUME */

document
.getElementById("volumeBar")
.addEventListener("input",function(){

if(currentSong){

currentSong.volume = this.value;

}

});

/* SEARCH */

function searchSongs(){

let value =
document
.getElementById("searchInput")
.value
.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let title =
card.querySelector("h2")
.innerText
.toLowerCase();

if(title.includes(value)){

card.style.display = "block";

}else{

card.style.display = "none";

}

});

}

/* START */

createSongs();

</script>

</body>
</html>
