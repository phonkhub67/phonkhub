<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet" href="cursor.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHONK HUB</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#05010d;
  color:white;
  overflow-x:hidden;
  padding-bottom:170px;
  background-image:
  radial-gradient(circle at top,#290033,#05010d 60%);
}

/* NAVBAR */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:rgba(0,0,0,0.75);
  border-bottom:1px solid #ff00ff55;
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.logo{
  font-size:40px;
  font-weight:bold;
  color:#ff00ff;
  text-shadow:
  0 0 15px #ff00ff,
  0 0 30px #ff00ff;
}

.search-box{
  width:350px;
}

.search-box input{
  width:100%;
  padding:14px 22px;
  border-radius:40px;
  border:1px solid #ff00ff55;
  background:#12061f;
  color:white;
  outline:none;
  font-size:15px;
}

/* HERO */

.hero{
  text-align:center;
  padding:20px 15px;
}

.hero img{
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #ff00ff;
  box-shadow: 0 0 20px #ff00ff55;
  display: block;
  margin: 0 auto;
}

.hero p{
  margin-top:15px;
  color:#bbb;
  font-size:16px;
  line-height:24px;
}

/* SONGS */

.songs{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */

.card{
  background:#0a0712;
  border-radius:22px;
  overflow:hidden;
  border:1px solid #ffffff10;
  transition:0.4s;
  position:relative;
}

.card:hover{
  transform:translateY(-8px);
  border:1px solid #ff00ff88;
  box-shadow:
  0 0 25px #ff00ff55;
}

.phonk-image{
  width:100%;
  height:320px;
  overflow:hidden;
  position:relative;
}

.phonk-image img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.star-btn{
  position:absolute;
  top:12px;
  right:12px;
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  color:rgba(255,255,255,0.75);
  font-size:22px;
  cursor:pointer;
  transition:.3s;
  z-index:5;
}

.star-btn:hover{
  background:rgba(255,0,255,0.2);
  transform:scale(1.1);
}

.star-btn.active{
  color:#ffd700;
  background:rgba(255,215,0,.15);
  box-shadow:0 0 18px rgba(255,215,0,.8);
}

.content{
  padding:20px;
}

.content h2{
  font-size:30px;
  margin-bottom:10px;
}

.artist{
  color:#ff00ff;
  margin-bottom:20px;
  font-size:16px;
}

/* BUTTONS */

.buttons{
  display:flex;
  gap:12px;
}

.play-btn{
  flex:1;
  background:
  linear-gradient(45deg,#ff00ff,#8a00ff);
  border:none;
  color:white;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

.download-btn{
  flex:1;
  background:#1a1a1a;
  border:none;
  color:white;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

/* MINI WAVE */

.mini-wave{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:20px;
}

.mini-wave span{
  width:4px;
  background:white;
  border-radius:10px;
  animation:wave 1s infinite ease-in-out;
}

.mini-wave span:nth-child(1){
  height:8px;
}

.mini-wave span:nth-child(2){
  height:16px;
  animation-delay:0.2s;
}

.mini-wave span:nth-child(3){
  height:10px;
  animation-delay:0.4s;
}

.mini-wave span:nth-child(4){
  height:18px;
  animation-delay:0.6s;
}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.5);
  }

  100%{
    transform:scaleY(0.5);
  }

}

/* PLAYER */

#nowPlaying{

  position:fixed;

  left:50%;
  bottom:85px;

  transform:translateX(-50%);

  width:92%;

  background:
  linear-gradient(
  45deg,
  rgba(15,0,25,0.96),
  rgba(5,5,15,0.96)
  );

  border-radius:28px;

  padding:18px;

  display:flex;

  flex-direction:column;

  gap:15px;

  z-index:9999;

  border:1px solid #ff00ff44;

  box-shadow:
  0 0 30px rgba(255,0,255,0.25);
  
  transition:bottom .45s ease, transform .45s ease, opacity .45s ease;

}

#nowPlaying.hidden{
  opacity:0;
  pointer-events:none;
  bottom:10px;
}

.player-top{

  display:flex;

  align-items:center;

  gap:16px;

}

.player-controls{
  display:flex;
  align-items:center;
  gap:12px;
}

#prevBtn, #nextBtn{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  color:white;
  font-size:20px;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.12);
}

#prevBtn:hover, #nextBtn:hover{
  background:rgba(255,0,255,0.15);
  transform:scale(1.05);
}

#pauseBtn{

  width:72px;
  height:72px;

  border:none;

  border-radius:50%;

  background:
  linear-gradient(45deg,#ff00ff,#8a00ff);

  color:white;

  font-size:28px;

  cursor:pointer;

  box-shadow:
  0 0 25px rgba(255,0,255,0.6);

}

#nowTitle{

  font-size:20px;

  font-weight:bold;

  line-height:28px;
  flex:1;

}

#progressBar,
#volumeBar{

  width:100%;

  accent-color:#ff00ff;

}

#loopBtn{
margin-left:auto;
width:54px;
height:54px;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
color:white;
font-size:24px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.12);
}
#loopBtn:hover{
background:rgba(255,0,255,0.15);
transform:translateY(-2px);
}
#loopBtn.active{
background:rgba(255,0,255,0.22);
border:1px solid rgba(255,0,255,0.45);
box-shadow:0 0 20px rgba(255,0,255,0.25);
}

#navToggle{
  position:fixed;
  bottom:90px;
  right:20px;
  width:52px;
  height:52px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  color:white;
  font-size:20px;
  cursor:pointer;
  z-index:100000;
  border:1px solid rgba(255,255,255,0.12);
  transition:0.35s;
}

#navToggle:hover{
  background:rgba(255,0,255,0.15);
}

#navToggle.active{
  background:rgba(255,0,255,0.25);
  border:1px solid rgba(255,0,255,0.45);
  box-shadow:0 0 20px rgba(255,0,255,0.3);
  transform:rotate(180deg);
}

/* APP NAVBAR */

.bottom-nav{

  position:fixed;

  bottom:0;
  left:0;

  width:100%;

  height:75px;

  background:
  rgba(8,5,18,0.96);

  border-top:
  1px solid #ff00ff44;

  display:flex;

  justify-content:space-around;

  align-items:center;

  z-index:99999;

  backdrop-filter:blur(12px);
  
  transition:0.45s ease;

}

.bottom-nav a{

  text-decoration:none;

  color:#bbb;

  font-size:11px;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:4px;

}

.bottom-nav a.active{

  color:#ff00ff;

}

.nav-icon{

  font-size:24px;

}

.bottom-nav.hidden{
  transform:translateY(100%);
}

/* MOBILE */

@media(max-width:700px){

  nav{
    flex-direction:column;
    gap:15px;
  }

  .search-box{
    width:100%;
  }

  .content h2{
    font-size:24px;
  }

  #pauseBtn{
    width:65px;
    height:65px;
  }

  #nowTitle{
    font-size:16px;
  }

}

footer{
  text-align:center;
  color:#777;
  padding:30px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

  <div class="logo">
    PHONK HUB
  </div>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search phonks..."
      onkeyup="searchSongs()"
    >

  </div>

</nav>

<!-- HERO -->

<section class="hero">

  <img src="logo.jpg">

  <p>
    Stream Your Favorite Drift & Aggressive Phonks
  </p>

</section>

<!-- SONGS -->

<section
class="songs"
id="songsContainer">
</section>

<!-- PLAYER -->

<div id="nowPlaying">

  <div class="player-top">

    <div class="player-controls">
      <button id="prevBtn" onclick="playPrevious()">⏮</button>
      <button id="pauseBtn" onclick="togglePause()">▶</button>
      <button id="nextBtn" onclick="playNext()">⏭</button>
    </div>

    <h3 id="nowTitle">No Song Playing</h3>

    <button id="loopBtn" onclick="toggleLoop()">⟲</button>

  </div>

  <input
    type="range"
    id="progressBar"
    min="0"
    max="100"
    value="0"
  >

  <input
    type="range"
    id="volumeBar"
    min="0"
    max="1"
    step="0.01"
    value="1"
  >

</div>

<!-- BOTTOM NAVBAR -->

<div class="bottom-nav">

  <a
    href="home.html"
    class="active"
  >

    <div class="nav-icon">
      🏠
    </div>

    HOME

  </a>

  <a href="host.html">

    <div class="nav-icon">
      👑
    </div>

    HOST

  </a>

  <a href="post.html">

    <div class="nav-icon">
        💬
    </div>

    POSTS

  </a>

  <a href="profile.html">

    <div class="nav-icon">
      👤
    </div>

    PROFILE

  </a>

</div>

<button id="navToggle" onclick="toggleNavbar()">▼</button>

<footer>
© 2026 PHONK HUB
</footer>

<script type="module">
// Firestore-backed songs loader and player logic
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG (match host.html) */
const firebaseConfig = {
  apiKey: "AIzaSyBecNPVaAA-cDg7Gmozx31BCIMWxrhPlh0",
  authDomain: "phonkhub-e2f7a.firebaseapp.com",
  projectId: "phonkhub-e2f7a",
  storageBucket: "phonkhub-e2f7a.appspot.com",
  messagingSenderId: "914767759699",
  appId: "1:914767759699:web:cd6aeb130938695f4c39a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// State
let songs = [];
let currentSong = null;
let currentButton = null;
let currentSongIndex = null;
let loopEnabled = false;
let isProgressDragging = false;

/* GET USER-SPECIFIC KEY */
function getFavoritesKey(){
  let user = localStorage.getItem("phonkUser") || "guest";
  return "favorites_" + user;
}

/* CREATE SONGS */
function createSongs(){
  const container = document.getElementById("songsContainer");
  container.innerHTML = "";

  songs.forEach((song, index)=>{
    const id = "song"+index;

    container.innerHTML += `
<div class="card">
  <div class="phonk-image">
    <img src="${song.image || 'logo.jpg'}">
    <button class="star-btn" onclick="toggleStar(event,${index})">★</button>
  </div>

  <div class="content">
    <h2>${escapeHtml(song.name || 'Untitled')}</h2>
    <p class="artist">PHONK ARTIST</p>

    <audio id="${id}">
      <source src="${song.file}">
    </audio>

    <div class="buttons">
      <button class="play-btn" onclick="playSong('${id}','${escapeJs(song.name || 'Untitled')}',this,${index})">
        <span class="play-text">PLAY</span>
        <div class="mini-wave"><span></span><span></span><span></span><span></span></div>
      </button>

      <a href="${song.file}" download style="flex:1;">
        <button class="download-btn" style="width:100%;">DOWNLOAD</button>
      </a>
    </div>
  </div>
</div>
`;
  });

  restoreStarStates();
}

// Helpers to safely inject strings into HTML/JS
function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeJs(str){
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

/* PLAY */
window.playSong = function(id, name, btn, index){
  let songEl = document.getElementById(id);
  if(!songEl) return;

  // Pause previous
  if(currentSong && currentSong !== songEl){
    currentSong.pause();
    currentSong.currentTime = 0;
  }

  if(currentButton && currentButton !== btn){
    const pt = currentButton.querySelector(".play-text");
    if(pt) pt.innerText = "PLAY";
  }

  if(songEl.paused){
    songEl.play().catch(err=>console.warn('play failed',err));
    currentSong = songEl;
    currentButton = btn;
    currentSongIndex = index;
    songEl.loop = loopEnabled;
    songEl.volume = document.getElementById("volumeBar").value;

    const pt = btn.querySelector(".play-text");
    if(pt) pt.innerText = "PAUSE";

    document.getElementById("nowTitle").innerText = name;
    document.getElementById("pauseBtn").innerText = "||";

    // attach progress handler
    songEl.ontimeupdate = function(){
      if(!isProgressDragging){
        const progress = (songEl.currentTime / (songEl.duration || 1)) * 100;
        document.getElementById('progressBar').value = isNaN(progress) ? 0 : progress;
      }
      if(songEl.ended && !songEl.loop){
        playNext();
      }
    };

  } else {
    songEl.pause();
    const pt = btn.querySelector(".play-text"); if(pt) pt.innerText = "PLAY";
    document.getElementById("pauseBtn").innerText = "▶";
  }
};

/* PLAY NEXT */
window.playNext = function(){
  if(currentSongIndex !== null){
    let nextIndex = currentSongIndex + 1;
    if(nextIndex >= songs.length) nextIndex = 0;
    const nextSong = songs[nextIndex];
    const nextElement = document.getElementById('song'+nextIndex);
    const nextButton = nextElement ? nextElement.closest('.card').querySelector('.play-btn') : document.querySelector('.play-btn');
    playSong('song'+nextIndex, nextSong.name, nextButton, nextIndex);
  } else if(songs.length>0){
    // play first
    const firstBtn = document.querySelector('.play-btn');
    playSong('song0', songs[0].name, firstBtn, 0);
  }
};

/* PLAY PREVIOUS */
window.playPrevious = function(){
  if(currentSongIndex !== null){
    let prevIndex = currentSongIndex - 1;
    if(prevIndex < 0) prevIndex = songs.length - 1;
    const prevSong = songs[prevIndex];
    const prevElement = document.getElementById('song'+prevIndex);
    const prevButton = prevElement ? prevElement.closest('.card').querySelector('.play-btn') : document.querySelectorAll('.play-btn')[prevIndex];
    playSong('song'+prevIndex, prevSong.name, prevButton, prevIndex);
  } else if(songs.length>0){
    const lastIndex = songs.length - 1;
    const btn = document.querySelectorAll('.play-btn')[lastIndex];
    playSong('song'+lastIndex, songs[lastIndex].name, btn, lastIndex);
  }
};

/* TOGGLE PAUSE */
window.togglePause = function(){
  if(currentSong){
    if(currentSong.paused){
      currentSong.play();
      document.getElementById('pauseBtn').innerText = '||';
      if(currentButton) currentButton.querySelector('.play-text').innerText = 'PAUSE';
    } else {
      currentSong.pause();
      document.getElementById('pauseBtn').innerText = '▶';
      if(currentButton) currentButton.querySelector('.play-text').innerText = 'PLAY';
    }
  }
};

/* TOGGLE LOOP */
window.toggleLoop = function(){
  loopEnabled = !loopEnabled;
  let btn = document.getElementById('loopBtn');
  if(loopEnabled){
    btn.classList.add('active'); if(currentSong) currentSong.loop = true;
  } else { btn.classList.remove('active'); if(currentSong) currentSong.loop = false; }
};

/* SEARCH */
window.searchSongs = function(){
  let value = document.getElementById('searchInput').value.toLowerCase();
  let cards = document.querySelectorAll('.card');
  cards.forEach(card=>{
    let title = card.querySelector('h2').innerText.toLowerCase();
    card.style.display = title.includes(value) ? 'block' : 'none';
  });
};

/* TOGGLE STAR */
window.toggleStar = function(event, index){
  event.stopPropagation();
  const key = getFavoritesKey();
  let favs = JSON.parse(localStorage.getItem(key) || '[]');
  const exists = favs.includes(index);
  if(exists){
    favs = favs.filter(i=>i!==index);
  } else {
    favs.push(index);
  }
  localStorage.setItem(key, JSON.stringify(favs));
  restoreStarStates();
};

function restoreStarStates(){
  const key = getFavoritesKey();
  let favs = JSON.parse(localStorage.getItem(key) || '[]');
  const buttons = document.querySelectorAll('.star-btn');
  buttons.forEach((btn, i)=>{
    btn.classList.toggle('active', favs.includes(i));
  });
}

/* NAV TOGGLE */
window.toggleNavbar = function(){
  const btn = document.getElementById('navToggle');
  btn.classList.toggle('active');
  const bottom = document.querySelector('.bottom-nav');
  bottom.classList.toggle('hidden');
};

// Progress and volume handlers
const progressBar = document.getElementById('progressBar');
progressBar.addEventListener('input', ()=>{ isProgressDragging = true; });
progressBar.addEventListener('change', ()=>{
  if(currentSong){
    const percent = Number(progressBar.value) / 100;
    currentSong.currentTime = (currentSong.duration || 0) * percent;
  }
  isProgressDragging = false;
});

document.getElementById('volumeBar').addEventListener('input', (e)=>{
  if(currentSong) currentSong.volume = e.target.value;
});

/* ---------- FIRESTORE LISTENER ---------- */
function startFirestoreListener(){
  const songsCol = collection(db, 'songs');
  onSnapshot(songsCol, (snapshot)=>{
    const newSongs = [];
    snapshot.forEach(doc => {
      const d = doc.data() || {};
      newSongs.push({
        name: d.title || d.name || 'Untitled',
        file: d.audio || d.file || d.audioURL || d.url || '',
        image: d.image || d.cover || 'logo.jpg'
      });
    });
    songs = newSongs;
    createSongs();
  }, (err)=>{
    console.error('Failed to read songs collection:', err);
  });
}

window.addEventListener('DOMContentLoaded', ()=>{
  startFirestoreListener();
});

</script>
<script src="cursor.js"></script>
</body>

</html>
